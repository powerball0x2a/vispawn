<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勾股定理可视化演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f5f5f5; font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        .ui-layer { position: absolute; z-index: 10; pointer-events: none; width: 100%; height: 100%; }
        .interactive { pointer-events: auto; }
        
        /* Custom Scrollbar for panel if needed */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .step-indicator {
            transition: all 0.3s ease;
        }
        .step-active {
            background-color: #4a90e2;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
        }
    </style>
</head>
<body>

    <!-- 3D Container -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div class="ui-layer flex flex-col justify-between p-6">
        
        <!-- Header -->
        <div class="flex justify-between items-start">
            <div class="glass-panel p-6 rounded-2xl interactive max-w-md animate-fade-in-down">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">勾股定理</h1>
                <p class="text-gray-600 mb-4 text-sm leading-relaxed">
                    直角三角形两条直角边的平方和等于斜边的平方。<br>
                    <span class="font-mono font-bold text-[#4a90e2]">a²</span> + <span class="font-mono font-bold text-[#e94560]">b²</span> = <span class="font-mono font-bold text-[#ffd700]">c²</span>
                </p>
                <div class="flex gap-2 text-xs font-semibold text-gray-500">
                    <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#4a90e2] mr-1"></span> a边 (直角边)</div>
                    <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#e94560] mr-1"></span> b边 (直角边)</div>
                    <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#ffd700] mr-1"></span> c边 (斜边)</div>
                </div>
            </div>

            <!-- Stats Panel (Dynamic) -->
            <div id="stats-panel" class="glass-panel p-4 rounded-xl interactive hidden md:block transition-opacity duration-500 opacity-0">
                <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">当前状态</h3>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div>
                        <div class="text-xs text-gray-400">蓝色面积</div>
                        <div id="count-a" class="text-xl font-bold text-[#4a90e2]">0</div>
                    </div>
                    <div>
                        <div class="text-xs text-gray-400">红色面积</div>
                        <div id="count-b" class="text-xl font-bold text-[#e94560]">0</div>
                    </div>
                    <div>
                        <div class="text-xs text-gray-400">金色面积</div>
                        <div id="count-c" class="text-xl font-bold text-[#fbbf24]">0</div>
                    </div>
                </div>
                <div id="equality-msg" class="mt-2 text-center text-sm font-bold text-green-600 h-5"></div>
            </div>
        </div>

        <!-- Controls & Timeline -->
        <div class="flex flex-col items-center w-full mb-4">
            
            <!-- Timeline Steps -->
            <div class="glass-panel px-6 py-3 rounded-full mb-6 interactive flex gap-4 items-center shadow-lg">
                <div id="step-0" class="step-indicator step-active px-3 py-1 rounded-full text-xs font-bold text-gray-500 cursor-default">1. 直角三角形</div>
                <div class="w-4 h-0.5 bg-gray-300"></div>
                <div id="step-1" class="step-indicator px-3 py-1 rounded-full text-xs font-bold text-gray-500 cursor-default">2. 构建正方形</div>
                <div class="w-4 h-0.5 bg-gray-300"></div>
                <div id="step-2" class="step-indicator px-3 py-1 rounded-full text-xs font-bold text-gray-500 cursor-default">3. 填充方块</div>
                <div class="w-4 h-0.5 bg-gray-300"></div>
                <div id="step-3" class="step-indicator px-3 py-1 rounded-full text-xs font-bold text-gray-500 cursor-default">4. 验证等式</div>
            </div>

            <!-- Control Buttons -->
            <div class="glass-panel p-2 rounded-2xl interactive flex gap-2 shadow-2xl">
                <button id="btn-reset" class="p-3 rounded-xl hover:bg-gray-100 text-gray-600 transition-colors" title="重置">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
                <button id="btn-play" class="px-8 py-3 rounded-xl bg-[#4a90e2] hover:bg-blue-600 text-white font-bold shadow-lg transition-transform transform active:scale-95 flex items-center gap-2">
                    <span id="play-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </span>
                    <span id="play-text">开始演示</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const COLORS = {
            bg: 0xf5f5f5,
            primary: 0x4a90e2, // Blue (Side a)
            secondary: 0xe94560, // Red (Side b)
            accent: 0xffd700, // Gold (Side c)
            grid: 0xe0e0e0,
            text: 0x333333
        };

        const SCENE_CONFIG = {
            a: 6, // Side length a
            b: 8, // Side length b
            cubeSize: 0.8,
            gap: 0.05
        };

        // --- Global Variables ---
        let scene, camera, renderer, controls;
        let triangleGroup, squaresGroup, cubesGroup;
        let animationId;
        let isPlaying = false;
        let currentPhase = 0; // 0: Triangle, 1: Squares, 2: Filling, 3: Done
        let cubes = []; // Array to store cube meshes for animation
        let synth; // Tone.js synth
        
        // Calculated values
        let sideC;
        let targetCubesA, targetCubesB, targetCubesC;

        // --- Initialization ---
        function init() {
            // Scene Setup
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(COLORS.bg);
            scene.fog = new THREE.Fog(COLORS.bg, 20, 100);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 25, 25);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.1; // Prevent going below ground

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 50;
            dirLight.shadow.camera.left = -20;
            dirLight.shadow.camera.right = 20;
            dirLight.shadow.camera.top = 20;
            dirLight.shadow.camera.bottom = -20;
            scene.add(dirLight);

            // Ground Plane (Grid)
            const gridHelper = new THREE.GridHelper(40, 40, 0xcccccc, 0xe5e5e5);
            scene.add(gridHelper);
            
            const planeGeometry = new THREE.PlaneGeometry(40, 40);
            const planeMaterial = new THREE.ShadowMaterial({ opacity: 0.1 });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.01;
            plane.receiveShadow = true;
            scene.add(plane);

            // Math Setup
            sideC = Math.sqrt(SCENE_CONFIG.a * SCENE_CONFIG.a + SCENE_CONFIG.b * SCENE_CONFIG.b);
            targetCubesA = SCENE_CONFIG.a * SCENE_CONFIG.a;
            targetCubesB = SCENE_CONFIG.b * SCENE_CONFIG.b;
            targetCubesC = Math.round(sideC * sideC); // Should be a^2 + b^2

            // Create Objects
            createTriangle();
            createSquares();
            initCubes();

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            document.getElementById('btn-play').addEventListener('click', togglePlay);
            document.getElementById('btn-reset').addEventListener('click', reset);

            // Start Loop
            animate();
        }

        // --- Geometry Creation ---

        function createTriangle() {
            triangleGroup = new THREE.Group();
            
            // Vertices: Right angle at (0,0,0)
            // A is on X axis, B is on Z axis (in 3D space)
            // Let's align: A=(a,0,0), B=(0,0,b). Hypotenuse connects them.
            const pA = new THREE.Vector3(SCENE_CONFIG.a, 0, 0);
            const pB = new THREE.Vector3(0, 0, SCENE_CONFIG.b); // Using Z for depth
            const pO = new THREE.Vector3(0, 0, 0);

            const materialA = new THREE.LineBasicMaterial({ color: COLORS.primary, linewidth: 3 });
            const materialB = new THREE.LineBasicMaterial({ color: COLORS.secondary, linewidth: 3 });
            const materialC = new THREE.LineBasicMaterial({ color: COLORS.accent, linewidth: 4 });

            const createLine = (p1, p2, mat) => {
                const points = [];
                points.push(p1);
                points.push(p2);
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                return new THREE.Line(geometry, mat);
            };

            const lineA = createLine(pO, pA, materialA);
            const lineB = createLine(pO, pB, materialB);
            const lineC = createLine(pA, pB, materialC);

            triangleGroup.add(lineA);
            triangleGroup.add(lineB);
            triangleGroup.add(lineC);

            // Center the group slightly
            triangleGroup.position.x = -SCENE_CONFIG.a / 2;
            triangleGroup.position.z = -SCENE_CONFIG.b / 2;

            scene.add(triangleGroup);
        }

        function createSquares() {
            squaresGroup = new THREE.Group();
            
            // Helper to create a flat square mesh
            const createSquareMesh = (width, height, color, pos, rotY) => {
                const geometry = new THREE.PlaneGeometry(width, height);
                const material = new THREE.MeshBasicMaterial({ 
                    color: color, 
                    transparent: true, 
                    opacity: 0.2, 
                    side: THREE.DoubleSide,
                    depthWrite: false
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.rotation.x = -Math.PI / 2; // Lay flat
                if (rotY) mesh.rotation.z = rotY; // Rotate around Y axis if needed (Plane is X/Y, so Z rotation works for X/Z plane)
                
                // Adjust position based on logic
                mesh.position.copy(pos);
                return mesh;
            };

            // 1. Square on Side A (Blue)
            // Side A is along X axis. Square extends in -Z direction.
            const sqA = createSquareMesh(SCENE_CONFIG.a, SCENE_CONFIG.a, COLORS.primary, new THREE.Vector3(0, 0, 0));
            sqA.position.x = SCENE_CONFIG.a / 2; // Center of the square
            sqA.position.z = -SCENE_CONFIG.a / 2; // Shift "out" (negative Z)
            
            // 2. Square on Side B (Red)
            // Side B is along Z axis. Square extends in -X direction.
